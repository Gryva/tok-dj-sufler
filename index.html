<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TOK — DJ sufler (demo)</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#16100E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TOK">
<link rel="stylesheet" href="style.css?v=14">
</head>
<body style="margin:0; background:#16100E; height:100%;">

<div class="tok-app">
  <div class="tok-head">
    <div class="tok-wordmark">TOK</div>
    <div class="tok-head-actions">
      <button class="tok-yt-link" id="tokCrossfadeToggle" aria-label="Uključi/isključi crossfade">⇌</button>
      <button class="tok-yt-link" id="tokQueueToggle" aria-label="Otvori queue">☰</button>
      <button class="tok-yt-link" id="tokChangePlaylist" aria-label="Promijeni playlistu">⇄</button>
    </div>
  </div>

  <div class="tok-main">
    <div class="tok-vinyl-wrap">
      <div class="tok-vinyl-cover" id="tokVinylCover">
        <img class="tok-vinyl-cover-img" id="tokVinylImg" alt="">
      </div>
      <div class="tok-vinyl" id="tokVinyl"></div>
      <div class="tok-vinyl-hole"></div>
    </div>

    <div class="tok-nowmeta">
      <div class="tok-now-title" id="tokNowTitle">Učitavanje playliste…</div>
      <div class="tok-now-artist" id="tokNowArtist"></div>
      <div class="tok-status" id="tokStatus"></div>
    </div>

    <div class="tok-wave" id="tokWave"></div>

    <div class="tok-transport">
      <button class="tok-skipbtn" id="tokPrevBtn" aria-label="Prošla pjesma">⏮</button>
      <button class="tok-playbtn" id="tokPlayBtn" aria-label="Pusti / pauziraj">▶</button>
      <button class="tok-skipbtn" id="tokNextBtn" aria-label="Sljedeća pjesma">⏭</button>
    </div>

    <div class="tok-dirs" id="tokDirs">
      <button class="tok-dir" data-dir="up">
        <div class="tok-dir-cover"></div>
        <div class="tok-dir-meta">
          <div class="tok-dir-track"></div>
          <div class="tok-dir-artist"></div>
          <div class="tok-dir-bpm"></div>
        </div>
        <div class="tok-dir-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22c4.4 0 7-2.8 7-6.8 0-3-1.6-4.8-2.7-6.4-.3.9-.9 1.7-1.7 2.2.4-2.7-.7-5.6-3.1-7.5-.3 2.1-1.2 3.6-2.6 4.9C7 9.8 5.5 11.6 5.5 14.4 5.5 18.6 8 22 12 22z"/>
          </svg>
        </div>
      </button>
      <button class="tok-dir" data-dir="flow">
        <div class="tok-dir-cover"></div>
        <div class="tok-dir-meta">
          <div class="tok-dir-track"></div>
          <div class="tok-dir-artist"></div>
          <div class="tok-dir-bpm"></div>
        </div>
        <div class="tok-dir-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 16c1.6 1.6 3.2 1.6 4.8 0 1.6-1.6 3.2-1.6 4.8 0 1.6 1.6 3.2 1.6 4.8 0 1.6-1.6 3.2-1.6 4.8 0"/>
            <path d="M2 11c1.6 1.6 3.2 1.6 4.8 0 1.6-1.6 3.2-1.6 4.8 0 1.6 1.6 3.2 1.6 4.8 0 1.6-1.6 3.2-1.6 4.8 0"/>
          </svg>
        </div>
      </button>
      <button class="tok-dir" data-dir="down">
        <div class="tok-dir-cover"></div>
        <div class="tok-dir-meta">
          <div class="tok-dir-track"></div>
          <div class="tok-dir-artist"></div>
          <div class="tok-dir-bpm"></div>
        </div>
        <div class="tok-dir-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 14.5a8.5 8.5 0 1 1-9.5-12.3A8.5 8.5 0 0 0 20 14.5z"/>
          </svg>
        </div>
      </button>
    </div>
  </div>

  <div id="ytPlayer" style="position:absolute; width:1px; height:1px; opacity:0.01; pointer-events:none; overflow:hidden;"></div>
  <div id="ytPlayerB" style="position:absolute; width:1px; height:1px; opacity:0.01; pointer-events:none; overflow:hidden;"></div>

  <div class="tok-backdrop" id="tokBackdrop"></div>
  <div class="tok-sheet" id="tokSheet">
    <div class="tok-sheet-handle" id="tokHandle"></div>
    <div class="tok-sheet-header">
      <div class="tok-sheet-title">Queue</div>
      <div class="tok-order-wrap">
        <div class="tok-order-label" id="tokOrderLabel"></div>
        <button class="tok-order-btn" id="tokOrderToggle" aria-label="Redoslijed reprodukcije">
          <svg id="tokOrderIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
        </button>
      </div>
    </div>
    <div class="tok-playlist-info" id="tokPlaylistInfo">
      <div class="tok-playlist-cover" id="tokPlaylistCover"></div>
      <div class="tok-playlist-meta">
        <div class="tok-playlist-name" id="tokPlaylistName"></div>
        <div class="tok-playlist-sub" id="tokPlaylistSub"></div>
      </div>
    </div>

    <input class="tok-queue-search" id="tokQueueSearch" type="text" placeholder="Pretraži pjesme...">

    <div class="tok-queue" id="tokQueue"></div>
  </div>

  <div class="tok-modal-backdrop" id="tokPlaylistBackdrop">
    <div class="tok-modal">
      <div class="tok-modal-title">Promijeni playlistu</div>
      <div class="tok-modal-text">Zalijepi YouTube Music playlist link ili ID.</div>
      <input class="tok-modal-input" id="tokPlaylistInput" type="text" placeholder="https://music.youtube.com/playlist?list=...">
      <div class="tok-modal-error" id="tokPlaylistError"></div>
      <div class="tok-modal-actions">
        <button class="tok-modal-btn" id="tokPlaylistCancel">Odustani</button>
        <button class="tok-modal-btn primary" id="tokPlaylistSave">Spremi</button>
      </div>
    </div>
  </div>

  <div class="tok-modal-backdrop" id="tokSongBackdrop">
    <div class="tok-modal">
      <div class="tok-modal-title" id="tokSongTitle">Pjesma</div>
      <div class="tok-modal-text" id="tokSongArtist"></div>
      <div class="tok-song-fields">
        <label class="tok-song-field">BPM
          <input class="tok-modal-input" id="tokSongBpm" type="number" min="1" max="999" inputmode="numeric">
        </label>
        <label class="tok-song-field">Key
          <input class="tok-modal-input" id="tokSongKey" type="text" placeholder="npr. 8A">
        </label>
        <label class="tok-song-field">Energy (1–5)
          <input class="tok-modal-input" id="tokSongEnergy" type="number" min="1" max="5" inputmode="numeric">
        </label>
        <label class="tok-song-field">Tagovi (zarezom)
          <input class="tok-modal-input" id="tokSongTags" type="text" placeholder="house, chill, ...">
        </label>
      </div>
      <div class="tok-modal-error" id="tokSongError"></div>
      <div class="tok-modal-actions">
        <button class="tok-modal-btn" id="tokSongCancel">Odustani</button>
        <button class="tok-modal-btn primary" id="tokSongSave">Spremi</button>
      </div>
    </div>
  </div>
</div>

<script src="engine.js?v=14"></script>
<script src="app.js?v=14"></script>
</body>
</html>
