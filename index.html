<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TOK — DJ sufler (demo)</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#16100E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TOK">
</head>
<body style="margin:0; background:#16100E; height:100%;">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Manrope:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap');

  html, body { height:100%; margin:0; }

  .tok-app {
    --bg: #16100E;
    --stage: #241914;
    --sheet: #2E1F19;
    --ink: #FBF1E7;
    --muted: #C9A99A;
    --ember: #FF5A3C;
    --dusk: #E2401D;
    --tide: #F0883E;
    --gold: #FFC857;
    font-family: 'Manrope', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    width: 100%;
    min-height: 100dvh;
    padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .tok-app * { box-sizing: border-box; }

  .tok-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .tok-wordmark { font-family:'Fraunces',serif; font-weight:900; font-size:24px; letter-spacing:0.2px; }
  .tok-head-actions { display:flex; align-items:center; gap:8px; }
  .tok-yt-link {
    display:flex; align-items:center; justify-content:center;
    width:34px; height:34px; border-radius:50%; border:none;
    background: var(--stage); color:var(--ink); text-decoration:none; font-size:13px; cursor:pointer;
    font-family:inherit;
  }

  .tok-main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 8px 0;
  }

  /* ---------- vinyl ---------- */
  .tok-vinyl-wrap { position:relative; width: min(48vw, 210px); aspect-ratio: 1; flex-shrink: 0; }

  /* cover art sits behind the ring and spins on its own */
  .tok-vinyl-cover {
    position:absolute; inset: 18%; border-radius:50%; overflow:hidden;
    background-color: var(--stage); z-index:1;
    animation: tok-spin 7s linear infinite;
    animation-play-state: paused;
  }
  .tok-vinyl-cover.spinning { animation-play-state: running; }
  .tok-vinyl-cover-img {
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; object-position:center; display:block;
  }

  /* the ring is static (grooves are concentric circles, so spinning it is invisible
     anyway) and has a real transparent hole punched via mask so the cover behind
     it shows through completely, with no clip-under-transform browser bugs */
  .tok-vinyl {
    position:absolute; inset:0; border-radius:50%; z-index:2; pointer-events:none;
    background:
      repeating-radial-gradient(circle farthest-side, rgba(0,0,0,0.45) 0px, rgba(0,0,0,0.45) 1px, rgba(255,255,255,0.14) 1px, rgba(255,255,255,0.14) 2px, transparent 2px, transparent 6px),
      var(--vinyl-color, conic-gradient(from 0deg, #FF5A3C, #FFC857, #E2401D, #F0883E, #FF5A3C));
    box-shadow: 0 22px 50px rgba(0,0,0,0.55);
    -webkit-mask-image: radial-gradient(circle farthest-side, transparent 0 31%, black 33% 100%);
    mask-image: radial-gradient(circle farthest-side, transparent 0 31%, black 33% 100%);
  }
  .tok-vinyl-hole {
    position:absolute; top:50%; left:50%; width:14px; height:14px;
    background:var(--bg); border-radius:50%; transform:translate(-50%,-50%); z-index:3;
  }
  @keyframes tok-spin { to { transform: rotate(360deg); } }


  .tok-nowmeta { text-align:center; width:100%; max-width: 420px; }
  .tok-now-title { font-family:'Fraunces',serif; font-weight:700; font-size:19px; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tok-now-artist { color:var(--muted); font-size:13.5px; margin-top:4px; }

  /* ---------- soundwave progress ---------- */
  .tok-wave { display:flex; align-items:center; gap:3px; margin-top:8px; width:100%; max-width:320px; height:24px; cursor:pointer; }
  .tok-wave-bar { flex:1; min-width:2px; border-radius:3px; background:rgba(255,255,255,0.14); transition: background 0.2s; }
  .tok-wave-bar.played { background: var(--wave-accent, var(--gold)); }

  /* ---------- transport ---------- */
  /* ---------- direction picker ---------- */
  .tok-dirs { display:flex; flex-direction:column; gap:10px; width:100%; max-width:420px; margin-top:10px; }
  .tok-dir {
    border:none; cursor:pointer; text-align:left; font-family:inherit; color:var(--ink);
    background: var(--stage); border-radius:16px; padding:10px 14px; display:flex; align-items:center; gap:12px;
    opacity:0.55; transition: opacity 0.2s, background 0.2s, transform 0.2s;
  }
  .tok-dir:active { transform:scale(0.98); }
  .tok-dir.chosen { opacity:1; background:var(--dusk); }
  .tok-dir-cover { width:40px; height:40px; border-radius:12px; flex-shrink:0; background-size:cover; background-position:center; background-color:var(--sheet); }
  .tok-dir-meta { flex:1; min-width:0; }
  .tok-dir-track { font-family:'Fraunces',serif; font-weight:700; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tok-dir-artist { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .tok-dir.chosen .tok-dir-artist { color:rgba(255,255,255,0.75); }
  .tok-dir-icon { flex-shrink:0; color:var(--muted); display:flex; }
  .tok-dir-icon svg { width:19px; height:19px; }
  .tok-dir.chosen .tok-dir-icon { color:#fff; }

  .tok-transport {
    display:flex; align-items:center; justify-content:center; gap:16px;
    background: var(--ink); border-radius:999px; padding:9px 16px; margin-top:4px;
  }
  .tok-transport button {
    border:none; cursor:pointer; color:var(--bg); font-family:inherit;
    display:flex; align-items:center; justify-content:center; background:transparent;
  }
  .tok-skipbtn { width:38px; height:38px; border-radius:50%; font-size:15px; color: var(--wave-accent, var(--dusk)); }
  .tok-skipbtn:active { transform:scale(0.92); }
  .tok-playbtn { width:50px; height:50px; border-radius:50%; background:#3a3631; color:#544f49; font-size:18px; }
  .tok-playbtn:active { transform:scale(0.94); }

  /* ---------- queue sheet ---------- */
  .tok-backdrop {
    position:fixed; inset:0;
    background: rgba(6,4,12,0.6);
    opacity:0; pointer-events:none;
    transition: opacity 0.3s ease;
    z-index: 5;
  }
  .tok-backdrop.open { opacity:1; pointer-events:auto; }

  .tok-sheet {
    position:fixed; left:0; right:0; bottom:0; top:18%;
    background: var(--stage);
    border-radius: 28px 28px 0 0;
    transform: translateY(102%);
    transition: transform 0.4s cubic-bezier(.22,1,.36,1);
    z-index: 6;
    padding: 14px 16px max(16px, env(safe-area-inset-bottom));
    display:flex; flex-direction:column;
  }
  .tok-sheet.open { transform: translateY(0); }
  .tok-sheet-handle { width:36px; height:4px; border-radius:3px; background:rgba(255,255,255,0.2); margin:0 auto 12px; cursor:pointer; flex-shrink:0; }
  .tok-sheet-title { font-family:'Fraunces',serif; font-weight:900; font-size:19px; margin-bottom:12px; flex-shrink:0; }

  .tok-queue { display:flex; flex-direction:column; gap:8px; overflow-y:auto; flex:1; min-height:0; }
  .tok-queue-row {
    display:flex; align-items:center; gap:12px;
    background:var(--sheet); border-radius:18px; padding:9px 12px;
    cursor:pointer; text-align:left; border:none; color:var(--ink); font-family:inherit; width:100%;
  }
  .tok-queue-row:active { transform:scale(0.98); }
  .tok-queue-row.current { background:#4a4038; }
  .tok-cover--queue { width:44px; height:44px; border-radius:13px; flex-shrink:0; background-size:cover; background-position:center; background-color:var(--stage); }
  .tok-queue-meta { flex:1; min-width:0; }
  .tok-queue-title { font-family:'Fraunces',serif; font-size:14.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tok-queue-artist { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .tok-queue-row.current .tok-queue-artist { color:rgba(255,255,255,0.75); }
  .tok-queue-dur { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); flex-shrink:0; }
  .tok-queue-row.current .tok-queue-dur { color:rgba(255,255,255,0.75); }

  .tok-status { text-align:center; color:var(--muted); font-size:13px; margin-top:8px; }

  @media (prefers-reduced-motion: reduce) {
    .tok-vinyl-cover, .tok-sheet, .tok-backdrop { animation:none !important; transition:none !important; }
  }
</style>

<div class="tok-app">
  <div class="tok-head">
    <div class="tok-wordmark">TOK</div>
    <div class="tok-head-actions">
      <button class="tok-yt-link" id="tokQueueToggle" aria-label="Otvori queue">☰</button>
      <button class="tok-yt-link" id="tokChangePlaylist" aria-label="Promijeni playlistu">⇄</button>
    </div>
  </div>

  <div class="tok-main">
    <div class="tok-vinyl-wrap">
      <div class="tok-vinyl-cover" id="tokVinylCover">
        <img class="tok-vinyl-cover-img" id="tokVinylImg" alt="">
      </div>
      <div class="tok-vinyl" id="tokVinyl"></div>
      <div class="tok-vinyl-hole"></div>
    </div>

    <div class="tok-nowmeta">
      <div class="tok-now-title" id="tokNowTitle">Učitavanje playliste…</div>
      <div class="tok-now-artist" id="tokNowArtist"></div>
      <div class="tok-status" id="tokStatus"></div>
    </div>

    <div class="tok-wave" id="tokWave"></div>

    <div class="tok-transport">
      <button class="tok-skipbtn" id="tokPrevBtn" aria-label="Prošla pjesma">⏮</button>
      <button class="tok-playbtn" id="tokPlayBtn" aria-label="Pusti / pauziraj">▶</button>
      <button class="tok-skipbtn" id="tokNextBtn" aria-label="Sljedeća pjesma">⏭</button>
    </div>

    <div class="tok-dirs" id="tokDirs">
      <button class="tok-dir" data-dir="up">
        <div class="tok-dir-cover"></div>
        <div class="tok-dir-meta">
          <div class="tok-dir-track"></div>
          <div class="tok-dir-artist"></div>
        </div>
        <div class="tok-dir-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22c4.4 0 7-2.8 7-6.8 0-3-1.6-4.8-2.7-6.4-.3.9-.9 1.7-1.7 2.2.4-2.7-.7-5.6-3.1-7.5-.3 2.1-1.2 3.6-2.6 4.9C7 9.8 5.5 11.6 5.5 14.4 5.5 18.6 8 22 12 22z"/>
          </svg>
        </div>
      </button>
      <button class="tok-dir" data-dir="flow">
        <div class="tok-dir-cover"></div>
        <div class="tok-dir-meta">
          <div class="tok-dir-track"></div>
          <div class="tok-dir-artist"></div>
        </div>
        <div class="tok-dir-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 16c1.6 1.6 3.2 1.6 4.8 0 1.6-1.6 3.2-1.6 4.8 0 1.6 1.6 3.2 1.6 4.8 0 1.6-1.6 3.2-1.6 4.8 0"/>
            <path d="M2 11c1.6 1.6 3.2 1.6 4.8 0 1.6-1.6 3.2-1.6 4.8 0 1.6 1.6 3.2 1.6 4.8 0 1.6-1.6 3.2-1.6 4.8 0"/>
          </svg>
        </div>
      </button>
      <button class="tok-dir" data-dir="down">
        <div class="tok-dir-cover"></div>
        <div class="tok-dir-meta">
          <div class="tok-dir-track"></div>
          <div class="tok-dir-artist"></div>
        </div>
        <div class="tok-dir-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 14.5a8.5 8.5 0 1 1-9.5-12.3A8.5 8.5 0 0 0 20 14.5z"/>
          </svg>
        </div>
      </button>
    </div>
  </div>

  <div id="ytPlayer" style="position:absolute; width:1px; height:1px; opacity:0.01; pointer-events:none; overflow:hidden;"></div>

  <div class="tok-backdrop" id="tokBackdrop"></div>
  <div class="tok-sheet" id="tokSheet">
    <div class="tok-sheet-handle" id="tokHandle"></div>
    <div class="tok-sheet-title">Queue</div>
    <div class="tok-queue" id="tokQueue"></div>
  </div>
</div>

<script>
(function(){
  const YT_API_KEY = 'AIzaSyCkZpbb-oVsH_s2Yjn5AAql3Pfke0MExTA';
  const DEFAULT_PLAYLIST_ID = 'PL9qqRdUh4PoNhlUS4g69SQTxteQKHVAe-';
  let PLAYLIST_ID = localStorage.getItem('tok_playlist_id') || DEFAULT_PLAYLIST_ID;

  let tracks = [];
  let currentIndex = 0;
  let player = null;
  let currentCandidates = null;
  let history = [];

  const state = { playing:false, queueOpen:false, armedDir:'flow' };

  const els = {
    playBtn: document.getElementById('tokPlayBtn'),
    prevBtn: document.getElementById('tokPrevBtn'),
    nextBtn: document.getElementById('tokNextBtn'),
    vinyl: document.getElementById('tokVinyl'),
    vinylCover: document.getElementById('tokVinylCover'),
    vinylImg: document.getElementById('tokVinylImg'),
    title: document.getElementById('tokNowTitle'),
    artist: document.getElementById('tokNowArtist'),
    status: document.getElementById('tokStatus'),
    wave: document.getElementById('tokWave'),
    queueToggle: document.getElementById('tokQueueToggle'),
    backdrop: document.getElementById('tokBackdrop'),
    sheet: document.getElementById('tokSheet'),
    handle: document.getElementById('tokHandle'),
    queue: document.getElementById('tokQueue'),
    dirs: document.getElementById('tokDirs'),
    changePlaylist: document.getElementById('tokChangePlaylist')
  };

  const WAVE_BARS = 40;
  function buildWave(){
    let html = '';
    for (let i = 0; i < WAVE_BARS; i++) {
      const h = 25 + Math.round(Math.sin(i * 1.3) * 20 + Math.sin(i * 0.4) * 30 + 30);
      html += '<div class="tok-wave-bar" style="height:' + Math.max(15, Math.min(100, h)) + '%"></div>';
    }
    els.wave.innerHTML = html;
  }
  function updateWaveProgress(pct){
    const bars = els.wave.children;
    const cutoff = Math.round((pct / 100) * bars.length);
    for (let i = 0; i < bars.length; i++) {
      bars[i].classList.toggle('played', i < cutoff);
    }
  }

  els.wave.addEventListener('click', (e) => {
    if (!player || typeof player.seekTo !== 'function') return;
    const rect = els.wave.getBoundingClientRect();
    const pct = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    const dur = player.getDuration() || tracks[currentIndex].durationSec || 0;
    if (!dur) return;
    player.seekTo(dur * pct, true);
    updateWaveProgress(pct * 100);
  });

  function ytThumb(videoId){
    return 'https://i.ytimg.com/vi/' + videoId + '/hqdefault.jpg';
  }

  function parseTitleArtist(snippetTitle, channelTitle){
    let artist = (channelTitle || '').replace(/\s*-\s*Topic$/i, '').trim();
    let title = snippetTitle;
    const m = snippetTitle.match(/^(.*?)\s*[-–]\s*(.*)$/);
    if (m && m[1] && m[2]) { artist = m[1].trim(); title = m[2].trim(); }
    return { title, artist: artist || 'Nepoznat izvođač' };
  }

  function parseISODuration(iso){
    const m = (iso || '').match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
    if (!m) return 0;
    return (parseInt(m[1] || 0, 10) * 3600) + (parseInt(m[2] || 0, 10) * 60) + parseInt(m[3] || 0, 10);
  }

  function fmtTime(s){
    s = Math.max(0, Math.round(s || 0));
    const m = Math.floor(s / 60), sec = s % 60;
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  async function fetchPlaylistTracks(){
    let items = [];
    let pageToken = '';
    do {
      const url = 'https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=' +
        PLAYLIST_ID + '&key=' + YT_API_KEY + (pageToken ? '&pageToken=' + pageToken : '');
      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok) throw new Error((data.error && data.error.message) || 'YouTube API greška');
      items = items.concat(data.items || []);
      pageToken = data.nextPageToken || '';
    } while (pageToken && items.length < 200);

    const seenIds = new Set();
    const result = items
      .filter(it => it.snippet && it.snippet.resourceId && it.snippet.resourceId.videoId &&
        it.snippet.title !== 'Deleted video' && it.snippet.title !== 'Private video')
      .map(it => {
        const vid = it.snippet.resourceId.videoId;
        const parsed = parseTitleArtist(it.snippet.title, it.snippet.videoOwnerChannelTitle);
        return { id: vid, title: parsed.title, artist: parsed.artist, thumb: ytThumb(vid), durationSec: 0 };
      })
      .filter(t => {
        if (seenIds.has(t.id)) return false;
        seenIds.add(t.id);
        return true;
      });

    for (let i = 0; i < result.length; i += 50) {
      const batch = result.slice(i, i + 50);
      const ids = batch.map(t => t.id).join(',');
      const url = 'https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=' + ids + '&key=' + YT_API_KEY;
      const res = await fetch(url);
      const data = await res.json();
      (data.items || []).forEach(v => {
        const t = result.find(x => x.id === v.id);
        if (t) t.durationSec = parseISODuration(v.contentDetails.duration);
      });
    }
    return result;
  }

  async function fetchPlaylist(){
    tracks = await fetchPlaylistTracks();
  }

  async function refreshPlaylist(){
    let fresh;
    try {
      fresh = await fetchPlaylistTracks();
    } catch (err) {
      return;
    }
    if (!fresh.length) return;

    const currentTrack = tracks[currentIndex];
    tracks = fresh;

    if (currentTrack) {
      const newIdx = tracks.findIndex(t => t.id === currentTrack.id);
      if (newIdx !== -1) currentIndex = newIdx;
    }

    renderQueue();
  }

  function renderQueue(){
    els.queue.innerHTML = tracks.map((t, i) => {
      const isCurrent = i === currentIndex;
      return '<button class="tok-queue-row' + (isCurrent ? ' current' : '') + '" data-idx="' + i + '">' +
        '<div class="tok-cover--queue" style="background-image:url(\'' + t.thumb + '\')"></div>' +
        '<div class="tok-queue-meta"><div class="tok-queue-title">' + t.title + '</div>' +
        '<div class="tok-queue-artist">' + t.artist + '</div></div>' +
        '<div class="tok-queue-dur">' + fmtTime(t.durationSec) + '</div></button>';
    }).join('');
  }

  function openQueue(){
    state.queueOpen = true;
    els.backdrop.classList.add('open');
    els.sheet.classList.add('open');
    refreshPlaylist();
  }
  function closeQueue(){
    state.queueOpen = false;
    els.backdrop.classList.remove('open');
    els.sheet.classList.remove('open');
  }

  els.queueToggle.addEventListener('click', () => state.queueOpen ? closeQueue() : openQueue());
  els.backdrop.addEventListener('click', closeQueue);
  els.handle.addEventListener('click', closeQueue);
  els.queue.addEventListener('click', (e) => {
    const row = e.target.closest('.tok-queue-row');
    if (!row) return;
    const idx = parseInt(row.getAttribute('data-idx'), 10);
    closeQueue();
    if (idx !== currentIndex) jumpToTrack(idx, true);
  });

  function pickCandidates(){
    const n = tracks.length;
    const flowIdx = (currentIndex + 1) % n;
    const used = new Set(history.slice(-3).map(t => t.id).concat([tracks[currentIndex].id, tracks[flowIdx].id]));
    function pickRandom(exclude){
      const opts = tracks
        .map((t, idx) => ({ t, idx }))
        .filter(({ t }) => !used.has(t.id) && !exclude.has(t.id));
      const pool = opts.length ? opts : tracks
        .map((t, idx) => ({ t, idx }))
        .filter(({ idx }) => idx !== currentIndex);
      return pool[Math.floor(Math.random() * pool.length)];
    }
    const up = pickRandom(new Set());
    const down = pickRandom(new Set([up.t.id]));
    return {
      up: { t: up.t, idx: up.idx },
      flow: { t: tracks[flowIdx], idx: flowIdx },
      down: { t: down.t, idx: down.idx }
    };
  }

  function renderDirs(){
    currentCandidates = pickCandidates();
    state.armedDir = 'flow';
    ['up','flow','down'].forEach(dir => {
      const card = els.dirs.querySelector('[data-dir="' + dir + '"]');
      const t = currentCandidates[dir].t;
      card.querySelector('.tok-dir-cover').style.backgroundImage = "url('" + t.thumb + "')";
      card.querySelector('.tok-dir-track').textContent = t.title;
      card.querySelector('.tok-dir-artist').textContent = t.artist;
      card.classList.toggle('chosen', dir === state.armedDir);
    });
  }

  els.dirs.addEventListener('click', (e) => {
    const card = e.target.closest('.tok-dir');
    if (!card) return;
    state.armedDir = card.getAttribute('data-dir');
    els.dirs.querySelectorAll('.tok-dir').forEach(c => c.classList.toggle('chosen', c === card));
  });

  function commitEndOfSong(){
    const picked = currentCandidates[state.armedDir];
    history.push(tracks[currentIndex]);
    currentIndex = picked.idx;
    loadCurrentTrack(true);
  }

  function updateMediaSession(t){
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t.title, artist: t.artist, album: 'YouTube Music',
      artwork: [{ src: t.thumb, sizes: '480x360', type: 'image/jpeg' }]
    });
  }

  function extractPlaylistId(input){
    const m = input.match(/[?&]list=([a-zA-Z0-9_-]+)/);
    if (m) return m[1];
    if (/^[a-zA-Z0-9_-]{10,}$/.test(input)) return input;
    return null;
  }

  els.changePlaylist.addEventListener('click', () => {
    const input = window.prompt('Zalijepi YouTube Music playlist link ili ID:', PLAYLIST_ID);
    if (!input) return;
    const id = extractPlaylistId(input.trim());
    if (!id) { window.alert('Nisam prepoznao playlist ID.'); return; }
    localStorage.setItem('tok_playlist_id', id);
    location.reload();
  });

  const colorCache = {};
  const DEFAULT_VINYL_BG = 'conic-gradient(from 0deg, #FF5A3C, #FFC857, #E2401D, #F0883E, #FF5A3C)';
  const DEFAULT_WAVE_ACCENT = '#FFC857';

  function rgbToHsl(r, g, b){
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, l = (max + min) / 2;
    if (max === min) { h = s = 0; }
    else {
      const d = max - min;
      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
      if (max === r) h = ((g - b) / d) + (g < b ? 6 : 0);
      else if (max === g) h = ((b - r) / d) + 2;
      else h = ((r - g) / d) + 4;
      h *= 60;
    }
    return { h, s, l };
  }

  function setVinylAccent(c){
    document.querySelector('.tok-app').style.setProperty('--vinyl-color', c.bg);
    document.querySelector('.tok-app').style.setProperty('--wave-accent', c.accent);
  }

  function applyVinylColor(t){
    if (colorCache[t.id]) { setVinylAccent(colorCache[t.id]); return; }
    setVinylAccent({ bg: DEFAULT_VINYL_BG, accent: DEFAULT_WAVE_ACCENT });
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = 16; canvas.height = 16;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 16, 16);
        const data = ctx.getImageData(0, 0, 16, 16).data;
        let r = 0, g = 0, b = 0, n = 0;
        for (let i = 0; i < data.length; i += 4) { r += data[i]; g += data[i + 1]; b += data[i + 2]; n++; }
        const hsl = rgbToHsl(r / n, g / n, b / n);
        const hue = hsl.h.toFixed(0);
        const c = {
          bg: 'conic-gradient(from 0deg, hsl(' + hue + ',80%,50%), hsl(' + hue + ',85%,68%), hsl(' + hue + ',80%,50%), hsl(' + hue + ',85%,68%), hsl(' + hue + ',80%,50%))',
          accent: 'hsl(' + hue + ',85%,60%)'
        };
        colorCache[t.id] = c;
        if (tracks[currentIndex] === t) setVinylAccent(c);
      } catch (e) { /* tainted canvas (no CORS on thumbnail) — keep default */ }
    };
    img.src = t.thumb;
  }

  function loadCurrentTrack(autoplay){
    const t = tracks[currentIndex];
    els.vinylImg.src = t.thumb;
    applyVinylColor(t);
    els.title.textContent = t.title;
    els.artist.textContent = t.artist;
    els.status.textContent = '';
    renderQueue();
    renderDirs();
    updateMediaSession(t);

    if (player && typeof player.loadVideoById === 'function') {
      if (autoplay) player.loadVideoById(t.id);
      else player.cueVideoById(t.id);
    }
  }

  function jumpToTrack(idx, autoplay){
    currentIndex = idx;
    loadCurrentTrack(autoplay);
  }

  els.prevBtn.addEventListener('click', () => {
    if (history.length) {
      const prevTrack = history.pop();
      currentIndex = tracks.findIndex(t => t.id === prevTrack.id);
      loadCurrentTrack(true);
    } else {
      jumpToTrack((currentIndex - 1 + tracks.length) % tracks.length, true);
    }
  });
  els.nextBtn.addEventListener('click', () => {
    commitEndOfSong();
  });
  els.playBtn.addEventListener('click', () => {
    if (!player || typeof player.getPlayerState !== 'function') return;
    if (player.getPlayerState() === YT.PlayerState.PLAYING) player.pauseVideo();
    else player.playVideo();
  });

  function onPlayerStateChange(e){
    if (e.data === YT.PlayerState.PLAYING) {
      state.playing = true;
      els.playBtn.textContent = '❙❙';
      els.vinylCover.classList.add('spinning');
      if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
    } else if (e.data === YT.PlayerState.PAUSED) {
      state.playing = false;
      els.playBtn.textContent = '▶';
      els.vinylCover.classList.remove('spinning');
      if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
    } else if (e.data === YT.PlayerState.ENDED) {
      commitEndOfSong();
    }
  }

  window.onYouTubeIframeAPIReady = function(){
    player = new YT.Player('ytPlayer', {
      height: '1', width: '1',
      videoId: tracks[currentIndex].id,
      playerVars: { autoplay:0, controls:0, disablekb:1, modestbranding:1, rel:0, playsinline:1 },
      events: { onStateChange: onPlayerStateChange }
    });
    if ('mediaSession' in navigator) {
      navigator.mediaSession.setActionHandler('play', () => player.playVideo());
      navigator.mediaSession.setActionHandler('pause', () => player.pauseVideo());
      navigator.mediaSession.setActionHandler('previoustrack', () => els.prevBtn.click());
      navigator.mediaSession.setActionHandler('nexttrack', () => els.nextBtn.click());
    }
  };

  setInterval(() => {
    if (!player || typeof player.getCurrentTime !== 'function' || !state.playing) return;
    const cur = player.getCurrentTime();
    const dur = player.getDuration() || tracks[currentIndex].durationSec || 0;
    if (!dur) return;
    updateWaveProgress(Math.min(100, (cur / dur) * 100));
  }, 250);

  setInterval(() => {
    if (tracks.length) refreshPlaylist();
  }, 30000);

  (async function bootstrap(){
    try {
      await fetchPlaylist();
    } catch (err) {
      els.title.textContent = 'Greška kod dohvata playliste';
      els.artist.textContent = String((err && err.message) || err);
      return;
    }
    if (!tracks.length) {
      els.title.textContent = 'Playlist je prazna ili nije javno dostupna';
      return;
    }
    buildWave();
    currentIndex = Math.floor(Math.random() * tracks.length);
    els.status.textContent = 'pritisni ▶ za reprodukciju';
    loadCurrentTrack(false);

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  })();
})();
</script>
</body>
