<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>TOK — DJ sufler (demo)</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#16100E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TOK">
</head>
<body style="margin:0; background:#16100E; height:100%;">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Manrope:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap');

  html, body { height:100%; margin:0; }

  .tok-app {
    --bg: #16100E;
    --stage: #241914;
    --sheet: #2E1F19;
    --ink: #FBF1E7;
    --muted: #C9A99A;
    --ember: #FF5A3C;
    --dusk: #E2401D;
    --tide: #F0883E;
    --gold: #FFC857;
    font-family: 'Manrope', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    width: 100%;
    min-height: 100dvh;
    padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .tok-app * { box-sizing: border-box; }

  .tok-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .tok-wordmark { font-family:'Fraunces',serif; font-weight:900; font-size:24px; letter-spacing:0.2px; }
  .tok-yt-link {
    display:flex; align-items:center; justify-content:center;
    width:34px; height:34px; border-radius:50%;
    background: var(--stage); color:var(--ink); text-decoration:none; font-size:13px;
  }

  .tok-main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 10px 0 4px;
  }

  /* ---------- vinyl ---------- */
  .tok-vinyl-wrap { width: min(62vw, 270px); aspect-ratio: 1; flex-shrink: 0; }
  .tok-vinyl {
    position: relative; width:100%; height:100%; border-radius:50%;
    background: conic-gradient(from 0deg, #FF5A3C, #FFC857, #E2401D, #F0883E, #FF5A3C);
    box-shadow: 0 22px 50px rgba(0,0,0,0.55);
    animation: tok-spin 7s linear infinite;
    animation-play-state: paused;
  }
  .tok-vinyl.spinning { animation-play-state: running; }
  .tok-vinyl::before {
    content:''; position:absolute; inset:6%; border-radius:50%;
    background: repeating-radial-gradient(circle, rgba(0,0,0,0.16) 0px, rgba(0,0,0,0.16) 1.5px, transparent 1.5px, transparent 5px);
  }
  .tok-vinyl-cover {
    position:absolute; inset:30%; border-radius:50%;
    background-color: var(--stage); background-size:cover; background-position:center;
    box-shadow: 0 0 0 6px var(--bg), inset 0 0 0 2px rgba(255,255,255,0.12);
  }
  .tok-vinyl-cover::after {
    content:''; position:absolute; top:50%; left:50%; width:14px; height:14px;
    background:var(--bg); border-radius:50%; transform:translate(-50%,-50%);
  }
  @keyframes tok-spin { to { transform: rotate(360deg); } }

  .tok-nowmeta { text-align:center; width:100%; max-width: 420px; }
  .tok-now-title { font-family:'Fraunces',serif; font-weight:700; font-size:21px; line-height:1.25; }
  .tok-now-artist { color:var(--muted); font-size:14px; margin-top:4px; }

  /* ---------- soundwave progress ---------- */
  .tok-wave { display:flex; align-items:center; gap:3px; margin-top:18px; width:100%; max-width:320px; height:28px; }
  .tok-wave-bar { flex:1; min-width:2px; border-radius:3px; background:rgba(255,255,255,0.14); transition: background 0.2s; }
  .tok-wave-bar.played { background: var(--gold); }

  /* ---------- transport ---------- */
  .tok-transport {
    display:flex; align-items:center; justify-content:center; gap:14px;
    background: var(--ink); border-radius:999px; padding:10px 16px; margin-top:4px;
  }
  .tok-transport button {
    border:none; cursor:pointer; color:var(--bg); font-family:inherit;
    display:flex; align-items:center; justify-content:center; background:transparent;
  }
  .tok-skipbtn { width:40px; height:40px; border-radius:50%; font-size:16px; }
  .tok-skipbtn:active { transform:scale(0.92); }
  .tok-playbtn { width:54px; height:54px; border-radius:50%; background:var(--dusk); color:var(--ink); font-size:19px; }
  .tok-playbtn:active { transform:scale(0.94); }

  .tok-queue-toggle {
    border:none; cursor:pointer; font-family:'Fraunces',serif; font-weight:700; font-size:13.5px;
    color:var(--ink); background:var(--stage); border-radius:999px; padding:10px 20px;
    display:flex; align-items:center; gap:6px;
  }
  .tok-queue-toggle:active { transform:scale(0.97); }

  /* ---------- queue sheet ---------- */
  .tok-backdrop {
    position:fixed; inset:0;
    background: rgba(6,4,12,0.6);
    opacity:0; pointer-events:none;
    transition: opacity 0.3s ease;
    z-index: 5;
  }
  .tok-backdrop.open { opacity:1; pointer-events:auto; }

  .tok-sheet {
    position:fixed; left:0; right:0; bottom:0; top:18%;
    background: var(--stage);
    border-radius: 28px 28px 0 0;
    transform: translateY(102%);
    transition: transform 0.4s cubic-bezier(.22,1,.36,1);
    z-index: 6;
    padding: 14px 16px max(16px, env(safe-area-inset-bottom));
    display:flex; flex-direction:column;
  }
  .tok-sheet.open { transform: translateY(0); }
  .tok-sheet-handle { width:36px; height:4px; border-radius:3px; background:rgba(255,255,255,0.2); margin:0 auto 12px; cursor:pointer; flex-shrink:0; }
  .tok-sheet-title { font-family:'Fraunces',serif; font-weight:900; font-size:19px; margin-bottom:12px; flex-shrink:0; }

  .tok-queue { display:flex; flex-direction:column; gap:8px; overflow-y:auto; flex:1; min-height:0; }
  .tok-queue-row {
    display:flex; align-items:center; gap:12px;
    background:var(--sheet); border-radius:18px; padding:9px 12px;
    cursor:pointer; text-align:left; border:none; color:var(--ink); font-family:inherit; width:100%;
  }
  .tok-queue-row:active { transform:scale(0.98); }
  .tok-queue-row.current { background:var(--dusk); }
  .tok-cover--queue { width:44px; height:44px; border-radius:13px; flex-shrink:0; background-size:cover; background-position:center; background-color:var(--stage); }
  .tok-queue-meta { flex:1; min-width:0; }
  .tok-queue-title { font-family:'Fraunces',serif; font-size:14.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tok-queue-artist { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .tok-queue-row.current .tok-queue-artist { color:rgba(255,255,255,0.75); }
  .tok-queue-dur { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); flex-shrink:0; }
  .tok-queue-row.current .tok-queue-dur { color:rgba(255,255,255,0.75); }

  .tok-status { text-align:center; color:var(--muted); font-size:13px; margin-top:8px; }

  @media (prefers-reduced-motion: reduce) {
    .tok-vinyl, .tok-sheet, .tok-backdrop { animation:none !important; transition:none !important; }
  }
</style>

<div class="tok-app">
  <div class="tok-head">
    <div class="tok-wordmark">TOK</div>
    <a class="tok-yt-link" id="tokYtLink" href="#" aria-label="Otvori u YouTubeu">▶</a>
  </div>

  <div class="tok-main">
    <div class="tok-vinyl-wrap">
      <div class="tok-vinyl" id="tokVinyl">
        <div class="tok-vinyl-cover" id="tokVinylCover"></div>
      </div>
    </div>

    <div class="tok-nowmeta">
      <div class="tok-now-title" id="tokNowTitle">Učitavanje playliste…</div>
      <div class="tok-now-artist" id="tokNowArtist"></div>
      <div class="tok-status" id="tokStatus"></div>
    </div>

    <div class="tok-wave" id="tokWave"></div>

    <div class="tok-transport">
      <button class="tok-skipbtn" id="tokPrevBtn" aria-label="Prošla pjesma">⏮</button>
      <button class="tok-playbtn" id="tokPlayBtn" aria-label="Pusti / pauziraj">▶</button>
      <button class="tok-skipbtn" id="tokNextBtn" aria-label="Sljedeća pjesma">⏭</button>
    </div>

    <button class="tok-queue-toggle" id="tokQueueToggle">Queue ▾</button>
  </div>

  <div id="ytPlayer" style="position:absolute; width:1px; height:1px; opacity:0.01; pointer-events:none; overflow:hidden;"></div>

  <div class="tok-backdrop" id="tokBackdrop"></div>
  <div class="tok-sheet" id="tokSheet">
    <div class="tok-sheet-handle" id="tokHandle"></div>
    <div class="tok-sheet-title">Queue</div>
    <div class="tok-queue" id="tokQueue"></div>
  </div>
</div>

<script>
(function(){
  const YT_API_KEY = 'AIzaSyCkZpbb-oVsH_s2Yjn5AAql3Pfke0MExTA';
  const PLAYLIST_ID = 'PL9qqRdUh4PoNhlUS4g69SQTxteQKHVAe-';

  let tracks = [];
  let currentIndex = 0;
  let player = null;

  const state = { playing:false, queueOpen:false };

  const els = {
    playBtn: document.getElementById('tokPlayBtn'),
    prevBtn: document.getElementById('tokPrevBtn'),
    nextBtn: document.getElementById('tokNextBtn'),
    vinyl: document.getElementById('tokVinyl'),
    vinylCover: document.getElementById('tokVinylCover'),
    title: document.getElementById('tokNowTitle'),
    artist: document.getElementById('tokNowArtist'),
    status: document.getElementById('tokStatus'),
    wave: document.getElementById('tokWave'),
    ytLink: document.getElementById('tokYtLink'),
    queueToggle: document.getElementById('tokQueueToggle'),
    backdrop: document.getElementById('tokBackdrop'),
    sheet: document.getElementById('tokSheet'),
    handle: document.getElementById('tokHandle'),
    queue: document.getElementById('tokQueue')
  };

  const WAVE_BARS = 40;
  function buildWave(){
    let html = '';
    for (let i = 0; i < WAVE_BARS; i++) {
      const h = 25 + Math.round(Math.sin(i * 1.3) * 20 + Math.sin(i * 0.4) * 30 + 30);
      html += '<div class="tok-wave-bar" style="height:' + Math.max(15, Math.min(100, h)) + '%"></div>';
    }
    els.wave.innerHTML = html;
  }
  function updateWaveProgress(pct){
    const bars = els.wave.children;
    const cutoff = Math.round((pct / 100) * bars.length);
    for (let i = 0; i < bars.length; i++) {
      bars[i].classList.toggle('played', i < cutoff);
    }
  }

  function ytThumb(videoId){
    return 'https://i.ytimg.com/vi/' + videoId + '/hqdefault.jpg';
  }

  function parseTitleArtist(snippetTitle, channelTitle){
    let artist = (channelTitle || '').replace(/\s*-\s*Topic$/i, '').trim();
    let title = snippetTitle;
    const m = snippetTitle.match(/^(.*?)\s*[-–]\s*(.*)$/);
    if (m && m[1] && m[2]) { artist = m[1].trim(); title = m[2].trim(); }
    return { title, artist: artist || 'Nepoznat izvođač' };
  }

  function parseISODuration(iso){
    const m = (iso || '').match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
    if (!m) return 0;
    return (parseInt(m[1] || 0, 10) * 3600) + (parseInt(m[2] || 0, 10) * 60) + parseInt(m[3] || 0, 10);
  }

  function fmtTime(s){
    s = Math.max(0, Math.round(s || 0));
    const m = Math.floor(s / 60), sec = s % 60;
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  async function fetchPlaylist(){
    let items = [];
    let pageToken = '';
    do {
      const url = 'https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=' +
        PLAYLIST_ID + '&key=' + YT_API_KEY + (pageToken ? '&pageToken=' + pageToken : '');
      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok) throw new Error((data.error && data.error.message) || 'YouTube API greška');
      items = items.concat(data.items || []);
      pageToken = data.nextPageToken || '';
    } while (pageToken && items.length < 200);

    tracks = items
      .filter(it => it.snippet && it.snippet.resourceId && it.snippet.resourceId.videoId &&
        it.snippet.title !== 'Deleted video' && it.snippet.title !== 'Private video')
      .map(it => {
        const vid = it.snippet.resourceId.videoId;
        const parsed = parseTitleArtist(it.snippet.title, it.snippet.videoOwnerChannelTitle);
        return { id: vid, title: parsed.title, artist: parsed.artist, thumb: ytThumb(vid), durationSec: 0 };
      });

    for (let i = 0; i < tracks.length; i += 50) {
      const batch = tracks.slice(i, i + 50);
      const ids = batch.map(t => t.id).join(',');
      const url = 'https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=' + ids + '&key=' + YT_API_KEY;
      const res = await fetch(url);
      const data = await res.json();
      (data.items || []).forEach(v => {
        const t = tracks.find(x => x.id === v.id);
        if (t) t.durationSec = parseISODuration(v.contentDetails.duration);
      });
    }
  }

  function renderQueue(){
    els.queue.innerHTML = tracks.map((t, i) => {
      const isCurrent = i === currentIndex;
      return '<button class="tok-queue-row' + (isCurrent ? ' current' : '') + '" data-idx="' + i + '">' +
        '<div class="tok-cover--queue" style="background-image:url(\'' + t.thumb + '\')"></div>' +
        '<div class="tok-queue-meta"><div class="tok-queue-title">' + t.title + '</div>' +
        '<div class="tok-queue-artist">' + t.artist + '</div></div>' +
        '<div class="tok-queue-dur">' + fmtTime(t.durationSec) + '</div></button>';
    }).join('');
  }

  function openQueue(){
    state.queueOpen = true;
    els.backdrop.classList.add('open');
    els.sheet.classList.add('open');
  }
  function closeQueue(){
    state.queueOpen = false;
    els.backdrop.classList.remove('open');
    els.sheet.classList.remove('open');
  }

  els.queueToggle.addEventListener('click', () => state.queueOpen ? closeQueue() : openQueue());
  els.backdrop.addEventListener('click', closeQueue);
  els.handle.addEventListener('click', closeQueue);
  els.queue.addEventListener('click', (e) => {
    const row = e.target.closest('.tok-queue-row');
    if (!row) return;
    const idx = parseInt(row.getAttribute('data-idx'), 10);
    closeQueue();
    if (idx !== currentIndex) jumpToTrack(idx, true);
  });

  function updateMediaSession(t){
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t.title, artist: t.artist, album: 'YouTube Music',
      artwork: [{ src: t.thumb, sizes: '480x360', type: 'image/jpeg' }]
    });
  }

  const isAndroid = /Android/i.test(navigator.userAgent);

  function braveLink(videoId){
    const target = 'music.youtube.com/watch?v=' + videoId;
    if (!isAndroid) return 'https://' + target;
    return 'intent://' + target +
      '#Intent;scheme=https;package=com.brave.browser;S.browser_fallback_url=' +
      encodeURIComponent('https://' + target) + ';end';
  }

  function loadCurrentTrack(autoplay){
    const t = tracks[currentIndex];
    els.vinylCover.style.backgroundImage = "url('" + t.thumb + "')";
    els.title.textContent = t.title;
    els.artist.textContent = t.artist;
    els.status.textContent = '';
    els.ytLink.href = braveLink(t.id);
    renderQueue();
    updateMediaSession(t);

    if (player && typeof player.loadVideoById === 'function') {
      if (autoplay) player.loadVideoById(t.id);
      else player.cueVideoById(t.id);
    }
  }

  function jumpToTrack(idx, autoplay){
    currentIndex = idx;
    loadCurrentTrack(autoplay);
  }

  els.prevBtn.addEventListener('click', () => {
    jumpToTrack((currentIndex - 1 + tracks.length) % tracks.length, true);
  });
  els.nextBtn.addEventListener('click', () => {
    jumpToTrack((currentIndex + 1) % tracks.length, true);
  });
  els.playBtn.addEventListener('click', () => {
    if (!player || typeof player.getPlayerState !== 'function') return;
    if (player.getPlayerState() === YT.PlayerState.PLAYING) player.pauseVideo();
    else player.playVideo();
  });

  function onPlayerStateChange(e){
    if (e.data === YT.PlayerState.PLAYING) {
      state.playing = true;
      els.playBtn.textContent = '❙❙';
      els.vinyl.classList.add('spinning');
      if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
    } else if (e.data === YT.PlayerState.PAUSED) {
      state.playing = false;
      els.playBtn.textContent = '▶';
      els.vinyl.classList.remove('spinning');
      if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
    } else if (e.data === YT.PlayerState.ENDED) {
      jumpToTrack((currentIndex + 1) % tracks.length, true);
    }
  }

  window.onYouTubeIframeAPIReady = function(){
    player = new YT.Player('ytPlayer', {
      height: '1', width: '1',
      videoId: tracks[currentIndex].id,
      playerVars: { autoplay:0, controls:0, disablekb:1, modestbranding:1, rel:0, playsinline:1 },
      events: { onStateChange: onPlayerStateChange }
    });
    if ('mediaSession' in navigator) {
      navigator.mediaSession.setActionHandler('play', () => player.playVideo());
      navigator.mediaSession.setActionHandler('pause', () => player.pauseVideo());
      navigator.mediaSession.setActionHandler('previoustrack', () => els.prevBtn.click());
      navigator.mediaSession.setActionHandler('nexttrack', () => els.nextBtn.click());
    }
  };

  setInterval(() => {
    if (!player || typeof player.getCurrentTime !== 'function' || !state.playing) return;
    const cur = player.getCurrentTime();
    const dur = player.getDuration() || tracks[currentIndex].durationSec || 0;
    if (!dur) return;
    updateWaveProgress(Math.min(100, (cur / dur) * 100));
  }, 250);

  (async function bootstrap(){
    try {
      await fetchPlaylist();
    } catch (err) {
      els.title.textContent = 'Greška kod dohvata playliste';
      els.artist.textContent = String((err && err.message) || err);
      return;
    }
    if (!tracks.length) {
      els.title.textContent = 'Playlist je prazna ili nije javno dostupna';
      return;
    }
    buildWave();
    currentIndex = Math.floor(Math.random() * tracks.length);
    els.status.textContent = 'pritisni ▶ za reprodukciju';
    loadCurrentTrack(false);

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  })();
})();
</script>
</body>
</html>
